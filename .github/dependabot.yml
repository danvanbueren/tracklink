# .github/dependabot.yml
version: 2
updates:
  - package-ecosystem: npm
    directory: /tracklink/frontend
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/New_York
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: deps
      include: scope
    groups:
      mui:
        patterns:
          - "@mui/*"
          - "@emotion/*"
      next-react:
        patterns:
          - next
          - react
          - react-dom
      dev:
        dependency-type: development
        patterns:
          - "*"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
